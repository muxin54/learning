name: Run Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/fastapi_learning" > .env
          echo "SECRET_KEY=test-secret-123" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "EXPIRE_MINUTES=60" >> .env

      - name: Run tests
        run: |
          python -m pytest app/test_todo.py -v
